<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プラットヨネザワ | ドキュメントポータル</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #1a2744;
  --primary-light: #2c3e5a;
  --accent: #c0392b;
  --gold: #b8860b;
  --bg: #f5f5f0;
  --card: #ffffff;
  --text: #1d1d1d;
  --text-sub: #6c757d;
  --border: #e0e0e0;
  --shadow: 0 2px 16px rgba(0,0,0,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); line-height:1.8; }
.hero {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  color: #fff; padding: 3rem 2rem 2.5rem; text-align: center;
}
.hero h1 { font-size: 1.8rem; font-weight: 900; margin-bottom: .5rem; letter-spacing: .05em; }
.hero p { font-size: .95rem; opacity: .85; max-width: 600px; margin: 0 auto; }
.container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
.section-title {
  font-size: 1.1rem; font-weight: 700; color: var(--primary);
  margin: 2rem 0 1rem; padding-bottom: .5rem;
  border-bottom: 2px solid var(--primary);
  display: flex; align-items: center; gap: .5rem;
}
.section-title .icon { font-size: 1.3rem; }
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.2rem; }
.card {
  background: var(--card); border-radius: 10px; padding: 1.5rem;
  box-shadow: var(--shadow); border: 1px solid var(--border);
  transition: transform .2s, box-shadow .2s;
  text-decoration: none; color: var(--text); display: block;
}
.card:hover { transform: translateY(-3px); box-shadow: 0 6px 24px rgba(0,0,0,0.12); }
.card .badge {
  display: inline-block; font-size: .65rem; font-weight: 700;
  padding: .15rem .5rem; border-radius: 3px; margin-bottom: .6rem; letter-spacing: .05em;
}
.badge-soft { background: #e8f4f8; color: #2980b9; }
.badge-hard { background: #fdecea; color: #c0392b; }
.badge-done { background: #eafaf1; color: #27ae60; }
.card h3 { font-size: 1rem; font-weight: 700; margin-bottom: .4rem; line-height: 1.5; }
.card p { font-size: .82rem; color: var(--text-sub); line-height: 1.6; }
.footer {
  text-align: center; padding: 2rem; font-size: .75rem;
  color: var(--text-sub); border-top: 1px solid var(--border); margin-top: 2rem;
}
@media (max-width: 600px) {
  .hero h1 { font-size: 1.4rem; }
  .card-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="hero">
  <h1>プラットヨネザワ</h1>
  <p>事業ごとのドキュメント・レポート・進捗を集約したポータルサイト</p>
</div>
<div class="container">

  <!-- レキマチ事業 -->
  <div class="section-title"><span class="icon">🏯</span> レキマチ事業（歴史的資源を活用した観光まちづくり）</div>
  <div class="card-grid">
    <a href="projects/rekimachi-soft.html" class="card">
      <span class="badge badge-soft">ソフト事業</span>
      <span class="badge badge-done">提出済 4/10</span>
      <h3>レキマチ ソフト事業</h3>
      <p>R7事業化支援 → R8モデル創出。人流データ分析、観光まちづくり計画策定、ベンチマーク比較、KPI設計。</p>
    </a>
    <a href="projects/rekimachi-hard.html" class="card">
      <span class="badge badge-hard">ハード事業</span>
      <h3>レキマチ ハード事業</h3>
      <p>上杉神社・稽照殿エリアの施設整備・周辺環境整備。11事業者参画、補助上限2億円。申請〆切 4/22。</p>
    </a>
  </div>

  <div class="card-grid">
    <a href="#" class="card">
      <span class="badge badge-soft">準備中</span>

      <p>置賜ガストロノミーコンテンツ造成事業（別申請）</p>

</div>
<div class="footer">

</div>
</body>
</html>
